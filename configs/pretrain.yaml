# =============================================================================
# DINOv3 Pretraining Config for IXI T1 MRI
#
# Based on SPECTRE + DINOv3 (facebookresearch/dinov3) innovations:
#   - Gram Anchoring: prevents patch feature degradation in long training
#   - Register tokens: trained from the start (not post-hoc)
#   - RoPE coord augmentations: shift/jitter/rescale for resolution robustness
# =============================================================================

train:
  batch_size_per_gpu: 8
  grad_accum_steps: 1
  data_dir: data/IXI-T1
  data_fraction: 1.0
  output_dir: outputs/dino_ixi
  saveckp_freq: 10
  resume_ckp: true
  seed: 42
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true
  log_wandb: false
  log_freq: 10

optim:
  epochs: 300
  weight_decay: 0.04
  weight_decay_end: 0.4
  base_lr: 0.0005
  lr: 0.0
  warmup_epochs: 20
  min_lr: 1.0e-06
  llrd_factor: 0.9
  patch_embed_lr_mult: 0.2
  projection_head_wd_mult: 1.0
  clip_grad_norm: 3.0
  scaling_rule: sqrt_wrt_1024
  adamw_beta1: 0.9
  adamw_beta2: 0.999

model:
  architecture: vit_small_patch16_96
  pretrained_weights: null
  hidden_dim: 2048
  bottleneck_dim: 256
  output_dim: 65536
  momentum_teacher: 0.996
  momentum_teacher_end: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30
  student_temp: 0.1
  center_momentum: 0.9
  freeze_last_layer: 1
  num_base_patches: 4
  num_local_views: 6

  # --- DINOv3: Register tokens (trained from the start) ---
  reg_tokens: 4

  # --- DINOv3: RoPE coord augmentations ---
  rope_shift_coords: 0.5
  rope_jitter_coords: 1.5
  rope_rescale_coords: 1.5

  # --- MRI-specific transform settings ---
  global_views_size: [96, 96, 96]
  local_views_size: [48, 48, 48]
  local_views_scale: [0.25, 0.5]
  roi_size: [192, 224, 192]
  spacing: [1.0, 1.0, 1.0]

# --- DINOv3: Gram Anchoring ---
gram:
  enabled: true
  loss_weight: 1.0
  img_level: true                     # Gram matrix per image (not per batch)
  apply_norm: true                    # L2-normalize before computing similarity
  remove_neg: false
  remove_only_teacher_neg: false
  update_freq: 10000                  # Refresh Gram Teacher every N steps
  first_update_step: 0                # Start Gram anchoring from step 0
  max_updates: null                   # Unlimited updates (null = no limit)

# =============================================================================
# DINOv3 Pretraining Config for Whole-Body MRI
#
# 扩展自 pretrain.yaml（脑部专用），适配全身多部位 MRI 预训练。
# 主要变更：
#   - data_dir 支持字典形式，指向多个数据源
#   - roi_size 增大以适配不同体部解剖
#   - 新增 balance_regions 选项，均衡不同解剖区域的采样
#   - CenterSpatialCrop 替换为 CropForeground
# =============================================================================

train:
  batch_size_per_gpu: 4            # 全身数据体积更大，适当减小 batch
  grad_accum_steps: 2              # 用梯度累积补偿 batch 大小
  data_dir: D:/rkj/MRI_model/data  # 统一数据目录（prepare_datasets.py 的输出）
  data_fraction: 1.0
  output_dir: outputs/dino_wholebody
  saveckp_freq: 10
  resume_ckp: true
  seed: 42
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true
  log_wandb: false
  log_freq: 10

  # --- 多数据源配置（可选，与 data_dir 二选一） ---
  # 当 data_dirs 存在时，优先于 data_dir
  # 键名 = 区域名，值 = prepare_all_datasets.py 输出的各区域目录
  # 只保留实际存在且有数据的区域，没有数据的区域请注释掉
  data_dirs:
    brain: /data/pretrain_ready/brain
    cardiac: /data/pretrain_ready/cardiac
    abdomen: /data/pretrain_ready/abdomen
    prostate: /data/pretrain_ready/prostate
    knee: /data/pretrain_ready/knee
    spine: /data/pretrain_ready/spine
    breast: /data/pretrain_ready/breast
    # other: /data/pretrain_ready/other

  # --- 区域均衡采样 ---
  balance_regions: true            # 启用加权采样，防止大数据集主导训练
  region_weights:                  # 各区域采样权重（可选，不设置则按 1/N 均分）
    brain: 1.0
    cardiac: 3.0                   # 心脏数据量少，提高权重
    abdomen: 3.0
    prostate: 3.0
    knee: 1.5
    spine: 3.0
    breast: 3.0

optim:
  epochs: 300
  weight_decay: 0.04
  weight_decay_end: 0.4
  base_lr: 0.0005
  lr: 0.0
  warmup_epochs: 20
  min_lr: 1.0e-06
  llrd_factor: 0.9
  patch_embed_lr_mult: 0.2
  projection_head_wd_mult: 1.0
  clip_grad_norm: 3.0
  scaling_rule: sqrt_wrt_1024
  adamw_beta1: 0.9
  adamw_beta2: 0.999

model:
  architecture: vit_small_patch16_96
  pretrained_weights: null
  hidden_dim: 2048
  bottleneck_dim: 256
  output_dim: 65536
  momentum_teacher: 0.996
  momentum_teacher_end: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30
  student_temp: 0.1
  center_momentum: 0.9
  freeze_last_layer: 1
  num_base_patches: 4
  num_local_views: 6

  # --- DINOv3: Register tokens ---
  reg_tokens: 4

  # --- DINOv3: RoPE coord augmentations ---
  rope_shift_coords: 0.5
  rope_jitter_coords: 1.5
  rope_rescale_coords: 1.5

  # --- 全身 MRI 变换参数 ---
  global_views_size: [96, 96, 96]
  local_views_size: [48, 48, 48]
  local_views_scale: [0.25, 0.5]
  roi_size: null                   # 前景裁剪模式下不需要固定 ROI
  spacing: [1.0, 1.0, 1.0]        # 统一各向同性重采样
  use_foreground_crop: true        # 使用前景裁剪替代中心裁剪

# --- DINOv3: Gram Anchoring ---
gram:
  enabled: true
  loss_weight: 1.0
  img_level: true
  apply_norm: true
  remove_neg: false
  remove_only_teacher_neg: false
  update_freq: 10000
  first_update_step: 0
  max_updates: null
